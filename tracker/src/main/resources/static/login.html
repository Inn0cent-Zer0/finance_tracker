<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sign In – Finance Tracker</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: #111827;
      --muted: #94a3b8;
      --text: #e5e7eb;
      --primary: #6366f1;
      --primary-600: #5458ee;
      --ring: rgba(99,102,241,0.5);
      --error: #f87171;
      --ok: #34d399;
      --input: #1f2937;
      --border: #374151;
      --shadow: 0 10px 30px rgba(0,0,0,.35);
    }
    * { box-sizing: border-box; }
    html, body {
      height: 100%;
      background: radial-gradient(1000px 600px at 20% 10%, #111827 20%, transparent 50%),
                  radial-gradient(900px 500px at 80% 0%, #1f2937 10%, transparent 60%),
                  var(--bg);
      color: var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, "Helvetica Neue", Arial;
      margin: 0; line-height: 1.4;
    }
    .wrap { min-height: 100%; display: grid; place-items: center; padding: 24px; }
    .card {
      width: 100%; max-width: 420px;
      background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.00)), var(--card);
      border: 1px solid var(--border); border-radius: 16px;
      box-shadow: var(--shadow); overflow: hidden;
    }
    .header { padding: 24px 24px 8px; border-bottom: 1px solid var(--border); }
    .title  { margin: 0 0 6px; font-size: 1.5rem; font-weight: 700; }
    .subtitle { margin: 0 0 8px; color: var(--muted); font-size: .95rem; }
    .body   { padding: 24px; display: grid; gap: 16px; }
    .row    { display: grid; gap: 8px; }
    label   { font-size: .95rem; color: var(--text); }
    .field  { position: relative; display: flex; align-items: center; }
    input   {
      width: 100%; padding: 12px 44px 12px 12px;
      background: var(--input); color: var(--text);
      border: 1px solid var(--border); border-radius: 10px; outline: none;
      transition: border-color .15s, box-shadow .15s;
    }
    input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px var(--ring); }
    .error { color: var(--error); font-size: .85rem; margin-top: 4px; display: none; }
    .toggle {
      position: absolute; right: 10px;
      background: transparent; border: none; color: var(--muted);
      cursor: pointer; padding: 6px 8px; border-radius: 8px;
    }
    .toggle:hover { color: var(--text); background: rgba(255,255,255,0.04); }
    .footer {
      padding: 20px 24px 24px;
      display: flex; gap: 12px; align-items: center; justify-content: space-between;
      border-top: 1px solid var(--border); flex-wrap: wrap;
    }
    .btn {
      background: var(--primary); color: white; border: none;
      padding: 12px 20px; border-radius: 12px; cursor: pointer;
      font-weight: 600; transition: filter .15s, background .15s;
    }
    .btn:hover { filter: brightness(1.05); background: var(--primary-600); }
    .note { color: var(--muted); font-size: .85rem; }
    #toast {
      position: fixed; bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(40px);
      padding: 12px 20px; border-radius: 10px;
      font-size: .9rem; font-weight: 500;
      opacity: 0; transition: opacity .3s, transform .3s;
      pointer-events: none; z-index: 999;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    #toast.ok    { background: #065f46; color: var(--ok);   border: 1px solid var(--ok); }
    #toast.error { background: #7f1d1d; color: var(--error); border: 1px solid var(--error); }
  </style>
</head>
<body>
  <main class="wrap">
    <div id="toast"></div>
    <form class="card" id="loginForm" novalidate>
      <div class="header">
        <h1 class="title">Welcome back</h1>
        <p class="subtitle">Sign in to your Finance Tracker account.</p>
      </div>

      <div class="body">
        <!-- Email -->
        <div class="row">
          <label for="email">Email</label>
          <div class="field">
            <input id="email" type="text" placeholder="you@example.com" autocomplete="email" required />
          </div>
          <div id="email-error" class="error">Please enter a valid email.</div>
        </div>

        <!-- Password -->
        <div class="row">
          <label for="password">Password</label>
          <div class="field">
            <input id="password" type="password" placeholder="Your password" autocomplete="current-password" required />
            <button class="toggle" type="button" aria-label="Show password" data-toggle="password">👁</button>
          </div>
          <div id="pwd-error" class="error">Please enter your password.</div>
        </div>
      </div>

      <div class="footer">
        <div class="note">No account? <a href="/index.html" style="color:var(--primary)">Sign up</a></div>
        <button type="submit" class="btn" id="submitBtn">Sign In</button>
      </div>

      <!-- Status box - shows exact error or success message -->
      <div id="statusBox" style="display:none; margin: 0 24px 20px; padding: 12px 16px; border-radius: 10px; font-size: .9rem;"></div>
    </form>
  </main>

  <script>
    const form     = document.getElementById('loginForm');
    const emailEl  = document.getElementById('email');
    const pwdEl    = document.getElementById('password');
    const emailErr = document.getElementById('email-error');
    const pwdErr   = document.getElementById('pwd-error');

    function showToast(msg, type = 'ok') {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.className = 'show ' + type;
      setTimeout(() => { toast.className = ''; }, 3500);
    }

    const submitBtn = document.getElementById('submitBtn');

    function showStatus(msg, type = 'error') {
      const box = document.getElementById('statusBox');
      box.textContent = msg;
      box.style.display = 'block';
      box.style.background = type === 'ok' ? '#065f46' : '#7f1d1d';
      box.style.color      = type === 'ok' ? '#34d399' : '#f87171';
      box.style.border     = type === 'ok' ? '1px solid #34d399' : '1px solid #f87171';
    }

    function hideStatus() {
      document.getElementById('statusBox').style.display = 'none';
    }

    // Password toggle
    document.querySelector('.toggle').addEventListener('click', () => {
      const isPwd = pwdEl.type === 'password';
      pwdEl.type = isPwd ? 'text' : 'password';
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideStatus();

      const emailOk = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(emailEl.value.trim());
      const pwdOk   = pwdEl.value.length > 0;

      emailErr.style.display = emailOk ? 'none' : 'block';
      pwdErr.style.display   = pwdOk   ? 'none' : 'block';
      if (!emailOk || !pwdOk) return;

      submitBtn.disabled = true;
      submitBtn.textContent = 'Signing in…';
      showStatus('Contacting server…', 'ok');

      try {
        const res  = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: emailEl.value.trim(), password: pwdEl.value })
        });

        const data = await res.json();
        console.log('[LOGIN]', res.status, data);

        if (!res.ok) {
          showStatus(data.error || 'Invalid email or password.', 'error');
          submitBtn.disabled = false;
          submitBtn.textContent = 'Sign In';
          return;
        }

        if (!data.token) {
          showStatus('Login succeeded but no token received. Check server logs.', 'error');
          submitBtn.disabled = false;
          submitBtn.textContent = 'Sign In';
          return;
        }

        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify({
          username: data.username,
          email: data.email,
          role: data.role
        }));

        showStatus('✓ Login successful! Redirecting to dashboard…', 'ok');
        submitBtn.textContent = '✓ Success';

        setTimeout(() => { window.location.href = '/dashboard.html'; }, 1200);

      } catch (err) {
        console.error('[LOGIN ERROR]', err);
        showStatus('Could not connect to server. Is the backend running on port 8080?', 'error');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Sign In';
      }
    });
  </script>
</body>
</html>
